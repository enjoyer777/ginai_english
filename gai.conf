# Force IPv4-mapped addresses to be preferred over IPv6 in getaddrinfo().
# Reason: VPS has no IPv6 connectivity but DNS returns AAAA for some hosts
# (e.g. api.telegram.org), causing TCP connections to time out before falling
# back to IPv4. Setting this precedence makes IPv4 win the sort order.
# See RFC 3484 / RFC 6724.
precedence ::ffff:0:0/96  100
